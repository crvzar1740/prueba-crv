<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAN Cognitive State Test®</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-dots"></div>

<!-- START -->
<div class="screen" id="start">
  <div class="card center">
    <div class="brain-icon">🧠</div>
    <h1>RAN Cognitive State Test®</h1>
    <div class="time-badge">⏱ 2–3 minutos</div>
    <p class="sub">Responde las siguientes preguntas según cómo te sientes <strong>en este momento</strong>.</p>
    <p class="meta">10 preguntas · Escala del 1 al 5 · Resultado inmediato</p>
    <button class="cta-main" onclick="startTest()">Comenzar el Test &nbsp;›</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="card">
    <div class="quiz-top">
      <div class="progress-wrap">
        <div class="progress-track"><div id="bar"></div></div>
        <span id="step"></span>
      </div>
    </div>
    <div class="category-label" id="catLabel"></div>
    <h2 id="question"></h2>
    <div class="options" id="options">
      <button onclick="selectAnswer(1)" id="btn1"><span class="num">1</span><span class="lbl">Muy bajo</span></button>
      <button onclick="selectAnswer(2)" id="btn2"><span class="num">2</span><span class="lbl">Bajo</span></button>
      <button onclick="selectAnswer(3)" id="btn3"><span class="num">3</span><span class="lbl">Moderado</span></button>
      <button onclick="selectAnswer(4)" id="btn4"><span class="num">4</span><span class="lbl">Alto</span></button>
      <button onclick="selectAnswer(5)" id="btn5"><span class="num">5</span><span class="lbl">Muy alto</span></button>
    </div>
    <div class="nav-row">
      <button class="nav-btn prev" id="prevBtn" onclick="prevQ()">‹ &nbsp;Anterior</button>
      <button class="nav-btn next" id="nextBtn" onclick="nextQ()">Siguiente &nbsp;›</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden center" id="result">
  <div class="card center">
    <div class="result-orb" id="resultOrb"></div>
    <p class="result-sup">TU ESTADO COGNITIVO ACTUAL</p>
    <h1 class="result-title" id="resultText"></h1>
    <div class="score-pill"><span id="scoreNum"></span><span class="score-max"> / 50 puntos</span></div>
    <p class="result-desc" id="desc"></p>
    <div class="rec-box">
      <p class="rec-label">RECOMENDACIÓN</p>
      <p id="rec"></p>
    </div>
    <div class="spectrum-wrap">
      <div class="spectrum-labels">
        <span>Saturación</span><span>Fatiga</span><span>Operativo</span><span>Alta claridad</span><span>Estado RAN</span>
      </div>
      <div class="spectrum-bar">
        <div class="spectrum-fill" id="specFill"></div>
        <div class="spectrum-marker" id="specMarker"></div>
      </div>
    </div>
    <div class="result-btns">
      <button class="cta-main">Aprender el Método RAN</button>
      <button class="cta-ghost" onclick="location.reload()">↺ &nbsp;Repetir test</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
