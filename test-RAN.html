<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RAN Test</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
  text-align: center;
}
.card {
  max-width: 600px;
  margin: 80px auto;
}
button {
  padding: 15px;
  margin: 10px;
  cursor: pointer;
}
.hidden { display: none; }
</style>

</head>
<body>

<div id="start" class="card">
  <h1>No estás tomando malas decisiones…</h1>
  <p>Estás decidiendo en mal estado</p>
  <button onclick="startTest()">Empezar</button>
</div>

<div id="quiz" class="card hidden">
  <h2 id="question"></h2>
  <button onclick="answer(1)">1</button>
  <button onclick="answer(2)">2</button>
  <button onclick="answer(3)">3</button>
  <button onclick="answer(4)">4</button>
  <button onclick="answer(5)">5</button>
</div>

<div id="result" class="card hidden">
  <h2 id="resultText"></h2>
  <p id="score"></p>
</div>

<script>
let i = 0;
let score = 0;

const questions = [
"¿Te cuesta concentrarte?",
"¿Te sentís cansado mentalmente?",
"¿Te distraés fácil?",
"¿Tenés claridad mental?",
"¿Podés sostener foco?",
"¿Te cuesta decidir?",
"¿Sentís saturación?",
"¿Te cuesta priorizar?",
"¿Tenés energía mental?",
"¿Estás enfocado?"
];

function startTest() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  load();
}

function load() {
  document.getElementById("question").innerText = questions[i];
}

function answer(v) {
  score += v;
  i++;

  if (i < questions.length) {
    load();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let text = "";

  if (score < 20) text = "Saturación";
  else if (score < 30) text = "Fatiga cognitiva";
  else if (score < 40) text = "Operativo";
  else text = "Alta claridad";

  document.getElementById("resultText").innerText = text;
  document.getElementById("score").innerText = score + "/50";
}
</script>

</body>
</html>
